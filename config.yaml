# Training Configuration
model_size: 'yolov8x'  # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
epochs: 100
batch_size: 16
image_size: 640
patience: 20
device: 'cuda'  # 'cuda' or 'cpu'

# Optimizer Settings
optimizer: 'AdamW'
learning_rate: 0.001
weight_decay: 0.0005

# Data Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10
translate: 0.1
scale: 0.5
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1

# Detection Settings
confidence_threshold: 0.25
iou_threshold: 0.45

# Paths
data_yaml: 'data.yaml'
project_name: 'runs/train'
experiment_name: 'pothole_detector'
